name: mobile_app
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  carousel_slider: ^5.1.1
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_launcher_icons: ^0.14.4
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  http: ^1.4.0
  intl: ^0.20.2
  loading_indicator: ^3.1.1

  privy_flutter: ^0.0.8
  qr_flutter: ^4.1.0
  stacked: ^3.4.0
  stacked_services: ^1.1.0

dev_dependencies:
  build_runner: ^2.4.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.1
  stacked_generator: ^1.3.3
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/logo.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/1024.png"
  min_sdk_android: 21

  web:
    generate: true
    image_path: "lib/assets/1024.png"
  windows:
    generate: true
    image_path: "lib/assets/1024.png"


